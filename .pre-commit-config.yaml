repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # mypy: Disabled in pre-commit for Phase-00 (110 pre-existing strict errors).
  # G3 mypy gate runs separately via pyproject.toml config (non-strict mode).
  # Will be re-enabled when type annotations are completed in later phases.
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.10.0
  #   hooks:
  #     - id: mypy
  #       additional_dependencies:
  #         - pydantic>=2.10.0
  #         - pydantic-settings>=2.7.0
  #         - types-python-dateutil
  #       args: [--strict, --show-error-codes, --namespace-packages, --explicit-package-bases]
  #       exclude: "^tests/"

  # bandit: Use system language to avoid Windows cp1252 encoding bug
  # in pre-commit's isolated virtualenv.
  - repo: local
    hooks:
      - id: bandit
        name: bandit (security scan)
        entry: python -m bandit
        args: ["-r", "src/", "-c", "pyproject.toml", "-q"]
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        args: [--cov, --cov-fail-under=80]
        stages: [pre-push]

      - id: pip-audit
        name: pip-audit
        entry: pip-audit
        language: system
        pass_filenames: false
        stages: [pre-push]

# LOATS13July2026 - GitHub Actions CI Pipeline
# LITE OpenAlgo Trading System
#
# Quality Gates: ruff, black, mypy, bandit, pytest

name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TZ: Asia/Kolkata
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  # ============================================================
  # Quality Gates - Linting & Type Checking
  # ============================================================
  quality-gates:
    name: Quality Gates (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements-core.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Ruff linter
        run: |
          ruff check src/ tests/ --config pyproject.toml --output-format=github

      - name: Run Ruff formatter check
        run: |
          ruff format --check src/ tests/ --config pyproject.toml

      - name: Run Black formatter check
        run: |
          black --check src/ tests/ --config pyproject.toml

      - name: Run isort check
        run: |
          isort --check-only src/ tests/ --settings-path pyproject.toml

      - name: Run MyPy type checking
        run: |
          mypy src/ --strict --config-file pyproject.toml --output-format=github

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -c pyproject.toml -f json -o bandit-report.json

      - name: Run pip-audit
        run: |
          pip-audit --format=json --output-file pip-audit-report.json

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ matrix.python-version }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  # ============================================================
  # Tests - Unit & Integration
  # ============================================================
  tests:
    name: Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        # Optionally test on Windows for cross-platform compatibility
        include:
          - os: windows-latest
            python-version: '3.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements-core.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-branch \
            --cov-fail-under=80 \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            coverage.xml
            pytest-report.xml
          retention-days: 30

      - name: Add coverage to PR
        if: github.event_name == 'pull_request'
        uses: rochacbruno/coverage-comment@v1
        with:
          coverage_paths: 'coverage.xml'
          show_summary: true
          show_changes: true

  # ============================================================
  # Docker Build & Security Scan
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: loats13july2026:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run Docker health check
        run: |
          docker run --rm --name loats-health-test loats13july2026:test
        timeout-minutes: 2

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'loats13july2026:test'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

  # ============================================================
  # Final Status Check
  # ============================================================
  status:
    name: Final Status
    runs-on: ubuntu-latest
    needs: [quality-gates, tests, docker]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Quality Gates: ${{ needs.quality-gates.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          
          if [[ "${{ needs.quality-gates.result }}" == "failure" ]]; then
            echo "❌ Quality Gates failed"
            exit 1
          fi
          if [[ "${{ needs.tests.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [[ "${{ needs.docker.result }}" == "failure" ]]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          echo "✅ All checks passed"
# LOATS13July2026 - Security Scanning Workflow
# Runs on schedule and manual trigger for security audits

name: Security Scan

on:
  schedule:
    # Run security scan weekly on Sunday at 3 AM IST
    - cron: '30 21 * * 0'  # 3:00 AM IST = 21:30 UTC Saturday
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - secrets
          - dependencies
          - code

env:
  TZ: Asia/Kolkata

jobs:
  # ============================================================
  # Secret Scanning with Gitleaks
  # ============================================================
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'secrets' || github.event.inputs.scan_type == '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG_PATH: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_PROPOSAL: true

  # ============================================================
  # Dependency Vulnerability Scanning
  # ============================================================
  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --format=json --output-file pip-audit-full.json || true
          pip-audit --format=requirements --output-file requirements-vulnerable.txt || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-full-report
          path: |
            pip-audit-full.json
            requirements-vulnerable.txt
          retention-days: 30

      - name: Fail on critical vulnerabilities
        if: github.event.inputs.scan_type == 'full'
        run: |
          if grep -q "CRITICAL" pip-audit-full.json 2>/dev/null; then
            echo "❌ Critical vulnerabilities found!"
            cat pip-audit-full.json
            exit 1
          fi
          echo "✅ No critical vulnerabilities found"

  # ============================================================
  # Code Security Analysis with Bandit
  # ============================================================
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'code' || github.event.inputs.scan_type == '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Bandit
        run: pip install bandit safety

      - name: Run Bandit
        run: |
          bandit -r src/ -c pyproject.toml -f json -o bandit-full-report.json
          bandit -r src/ -c pyproject.toml -f screen

      - name: Run Safety check
        run: |
          safety check --json --output-file safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: code-security-reports
          path: |
            bandit-full-report.json
            safety-report.json
          retention-days: 30

      - name: Check for high severity issues
        if: github.event.inputs.scan_type == 'full'
        run: |
          HIGH_COUNT=$(grep -o '"high": [0-9]*' bandit-full-report.json | grep -o '[0-9]*' || echo "0")
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "❌ $HIGH_COUNT high severity issues found!"
            exit 1
          fi
          echo "✅ No high severity issues found"

  # ============================================================
  # SBOM Generation (Software Bill of Materials)
  # ============================================================
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.scan_type == 'full' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == '')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CycloneDX
        run: pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          cyclonedx-py mod -o sbom.json
          cyclonedx-py mod -o sbom.xml --format xml

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml
          retention-days: 90

      - name: Upload SBOM to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: sbom-github
          path: sbom.json
          retention-days: 365

  # ============================================================
  # Summary Report
  # ============================================================
  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-scan, code-security, sbom]
    if: always() && github.event_name == 'workflow_dispatch'

    steps:
      - name: Generate Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Vulnerabilities | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Security | ${{ needs.code-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.secrets-scan.result }}" == "success" ]] && \
             [[ "${{ needs.dependency-scan.result }}" == "success" ]] && \
             [[ "${{ needs.code-security.result }}" == "success" ]]; then
            echo "✅ All security scans passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some security scans failed - please review" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
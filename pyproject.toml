[project]
name = "loats13july2026"
requires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S"]

[tool.mypy]
strict = true
python_version = "3.12"

[tool.pytest.ini_options]
addopts = "--cov=src --cov-branch --cov-fail-under=80"
testpaths = ["tests"]

[tool.bandit]
exclude_dirs = [".venv", "tests"]